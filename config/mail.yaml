mail:
  cooldown_sec: 60
  max_consecutive_fails: 3
  retryable_status_codes: [429, 500, 502, 503, 504]
  http_timeout_sec: 15
  wait_timeout_sec: 120
  poll_interval_sec: 5
  max_retries: 3
  retry_max_delay_sec: 30
  mail_tm_bases:
    - "https://api.mail.tm"
  testmail_base_url: "https://api.testmail.app"
  mailosaur_base_url: "https://mailosaur.com/api"
  guerrillamail_base_url: "https://www.guerrillamail.com/ajax.php"
  gmail_base_url: "https://mail.google.com"
  gmail_inbox_url: "https://mail.google.com/mail/u/0/#inbox"
  gmail_search_url_template: "https://mail.google.com/mail/u/0/#search/{query}"
  sms_store_cap: 500
