log:
  # Append mode: true = giữ log cũ, false = xóa sạch khi khởi động
  append: false
  level: "DEBUG"

  # all.log — tee stdout+stderr ra file
  all_log:
    enabled: true
    path: "logs/all.log"
    append: false  # false = xóa sạch mỗi lần khởi động

  # Console output
  console:
    enabled: true
    level: "INFO"
    format: "%(message)s"

  # File output (per-service log, RotatingFileHandler)
  file:
    enabled: true
    level: "DEBUG"
    path: "logs/app.log"
    format: "[%(asctime)s] [%(levelname)-5s] %(message)s"
    date_format: "%Y-%m-%d %H:%M:%S"
    max_bytes: 10485760  # 10 MB
    backup_count: 5
