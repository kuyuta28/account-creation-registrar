gmail:
  # Gmail TOTP 2FA login flow (src/services/gmail/login.py).
  # Khác google_oauth (OAuth account chooser) — đây là direct login với TOTP.
  signin_url: "https://accounts.google.com/signin"
  success_url: "myaccount.google.com"

  # Selectors
  email_input: 'input[type="email"]'
  email_next: "#identifierNext"
  password_input: 'input[name="Passwd"]'
  password_next: "#passwordNext"
  challenge_totp: '[data-challengetype="6"]'   # Google Authenticator option
  totp_input: 'input[name="totpPin"]'
  totp_next: '[id$="Next"]'

  # Delays (giây) — chờ load state sau mỗi step
  post_email_delay_sec: 1.5
  post_password_delay_sec: 2
  post_challenge_click_delay_sec: 2
  post_totp_delay_sec: 3

  # Timeouts (ms)
  challenge_visible_timeout_ms: 10000
  totp_visible_timeout_ms: 10000
